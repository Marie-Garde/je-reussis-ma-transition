<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog - Rachida Blanchard</title>
    <meta
      name="description"
      content="Articles et réflexions de Rachida Blanchard sur l'accompagnement des femmes sensibles et anxieuses."
    />
    <link rel="stylesheet" href="assets/styles/main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      .blog-hero {
        padding: 8rem 2rem 3rem;
        max-width: 800px;
      }

      .blog-hero h1 {
        font-size: clamp(2rem, 5vw, 3rem);
        color: var(--dark-text);
        margin-bottom: 1rem;
      }

      .blog-hero p {
        color: var(--text-color);
        font-size: 1.05rem;
      }

      .blog-empty {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        padding: 2rem 2rem 8rem;
        gap: 0.75rem;
        max-width: 800px;
      }

      .blog-empty h2 {
        font-size: 1.3rem;
        color: var(--dark-text);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div id="header-placeholder"></div>

    <main role="main">
      <section class="blog-hero">
        <h1>Le Blog</h1>
        <p>Des réflexions, des outils et des histoires pour t'accompagner au quotidien.</p>
      </section>

      <div class="blog-empty">
        <h2>Aucun article pour l'instant</h2>
      </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="components/loader.js"></script>
    <script src="script.js"></script>
  </body>
</html>
